<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Companio — Family Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
.signout-btn{background:var(--wheat,#E7B86A);color:var(--aubergine-dark,#322E3D);border:0;border-radius:9px;padding:8px 16px;font-weight:800;font-size:.85rem;cursor:pointer;font-family:inherit;transition:background .15s}.signout-btn:hover{background:var(--wheat-deep,#C8943B)}
:root{
  --aubergine:#4A4458; --aubergine-dark:#322E3D; --wheat:#E7B86A; --wheat-deep:#C8943B;
  --lilac:#9B8AA8; --offwhite:#F4F0EA; --ink:#241F2B; --line:#E2DBD0; --card:#FFFFFF;
  --mist:#FAF7F1; --muted:#7A7488; --good:#2E7D52; --warn:#C8943B; --bad:#B3403A;
  --serif:"Fraunces",Georgia,serif; --sans:"Mulish",system-ui,sans-serif; --r:14px; --shadow:0 8px 30px rgba(50,46,61,.10);
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);background:var(--offwhite);color:var(--ink);font-size:15px}
h1,h2,h3{font-family:var(--serif);color:var(--aubergine-dark);margin:0}
.muted{color:var(--muted)}
.topbar{background:var(--aubergine-dark);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar .brand{display:flex;align-items:center;gap:10px}
.topbar .mark{width:30px;height:30px;border-radius:50%;background:var(--wheat);display:grid;place-items:center;color:var(--aubergine-dark);font-weight:800}
.topbar b{font-family:var(--serif);font-size:1.2rem}
.topbar .who{font-size:.85rem;color:rgba(244,240,234,.7)} .topbar a{color:var(--wheat);font-weight:700}
.wrap{max-width:860px;margin:0 auto;padding:26px 20px 60px}
.hello{margin-bottom:22px} .hello h1{font-size:1.8rem}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tabs button{font:inherit;font-weight:800;font-size:.9rem;padding:9px 16px;border-radius:99px;border:1.5px solid var(--line);background:var(--card);color:var(--aubergine);cursor:pointer}
.tabs button.on{background:var(--aubergine);color:#fff;border-color:var(--aubergine)}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
.panel-h{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.panel-h h3{font-size:1.05rem}
.row{padding:15px 20px;border-bottom:1px solid var(--line)} .row:last-child{border-bottom:none}
.name{font-weight:800;color:var(--aubergine-dark)}
.chip{display:inline-block;font-size:.72rem;font-weight:800;padding:3px 10px;border-radius:99px;background:var(--mist);color:var(--aubergine);border:1px solid var(--line)}
.chip.good{background:rgba(46,125,82,.1);color:var(--good);border-color:transparent}
.chip.wheat{background:rgba(231,184,106,.18);color:var(--wheat-deep);border-color:transparent}
.chip.bad{background:rgba(179,64,58,.1);color:var(--bad);border-color:transparent}
.note-card{background:var(--mist);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin:0 20px 12px}
.note-card .meta{font-size:.76rem;color:var(--muted);margin-bottom:5px}
.empty{padding:36px 20px;text-align:center;color:var(--muted)}
.btn{font:inherit;font-weight:800;font-size:.85rem;border-radius:9px;padding:8px 15px;border:1.5px solid var(--aubergine);background:transparent;color:var(--aubergine);cursor:pointer}
.btn.primary{background:var(--wheat);border-color:var(--wheat);color:var(--aubergine-dark)}
input{font:inherit;width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;margin-top:5px}
label{font-weight:700;font-size:.85rem;display:block;margin-top:12px}
.login-bg{min-height:100vh;display:grid;place-items:center;background:var(--aubergine-dark)}
.login-card{background:var(--offwhite);border-radius:16px;padding:34px;width:min(380px,92vw);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.err{background:rgba(179,64,58,.1);color:var(--bad);border:1px solid rgba(179,64,58,.3);border-radius:9px;padding:10px 13px;font-size:.85rem;font-weight:700;margin:12px 0}
.big{font-family:var(--serif);font-size:1.8rem;color:var(--aubergine-dark)}
</style>

  /* modal + toast */
  #cmpModalOverlay{position:fixed;inset:0;background:rgba(50,46,61,.55);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:99999;padding:20px;}
  #cmpModalOverlay.on{display:flex;}
  .cmp-modal{background:#fff;border-radius:18px;max-width:440px;width:100%;
    box-shadow:0 24px 60px rgba(50,46,61,.32);overflow:hidden;
    font-family:"Mulish",system-ui,sans-serif;animation:cmpPop .16s ease-out;}
  @keyframes cmpPop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .cmp-modal-head{display:flex;align-items:center;gap:11px;padding:18px 22px 0;}
  .cmp-modal-head .cmp-logo{width:30px;height:30px;}
  .cmp-modal-head b{font-family:"Fraunces",Georgia,serif;color:#322E3D;font-size:1.08rem;}
  .cmp-modal-body{padding:14px 22px 4px;color:#3a3646;font-size:.97rem;line-height:1.5;white-space:pre-wrap;}
  .cmp-modal-title{font-family:"Fraunces",Georgia,serif;color:#322E3D;font-size:1.15rem;margin:10px 22px 0;}
  .cmp-modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 22px 20px;}
  .cmp-btn{border:0;border-radius:10px;padding:10px 18px;font-weight:800;font-size:.92rem;cursor:pointer;font-family:inherit;}
  .cmp-btn-primary{background:#E7B86A;color:#322E3D;}
  .cmp-btn-primary:hover{background:#C8943B;}
  .cmp-btn-ghost{background:#efe9f0;color:#4A4458;}
  .cmp-btn-ghost:hover{background:#e3dae6;}
  .cmp-btn-danger{background:#b3402f;color:#fff;}
  .cmp-btn-danger:hover{background:#992f20;}
  #cmpToastWrap{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:100000;
    display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
  .cmp-toast{background:#322E3D;color:#F4F0EA;padding:12px 18px;border-radius:12px;font-size:.9rem;
    font-family:"Mulish",system-ui,sans-serif;box-shadow:0 10px 30px rgba(50,46,61,.34);
    display:flex;align-items:center;gap:9px;animation:cmpToastIn .2s ease-out;max-width:90vw;}
  .cmp-toast.ok{border-left:4px solid #E7B86A;}
  .cmp-toast.err{border-left:4px solid #b3402f;}
  @keyframes cmpToastIn{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
</style>
<div id="cmpModalOverlay"><div class="cmp-modal" role="dialog" aria-modal="true">
  <div class="cmp-modal-head"><span class="cmp-logo"></span><b>Companio</b></div>
  <div class="cmp-modal-title" id="cmpModalTitle" style="display:none"></div>
  <div class="cmp-modal-body" id="cmpModalBody"></div>
  <input id="cmpModalInput" style="display:none;margin:0 22px 4px;width:calc(100% - 44px);box-sizing:border-box;padding:10px 12px;border:1px solid #d9d2dd;border-radius:10px;font-family:inherit;font-size:.95rem"/>
  <div class="cmp-modal-foot" id="cmpModalFoot"></div>
</div></div>
<div id="cmpToastWrap"></div>
<script>
(function(){
  if(window.__cmpModalReady) return; window.__cmpModalReady = true;
  var ov, body, foot, titleEl;
  function els(){ ov=document.getElementById('cmpModalOverlay'); body=document.getElementById('cmpModalBody');
    foot=document.getElementById('cmpModalFoot'); titleEl=document.getElementById('cmpModalTitle'); }
  function ready(fn){ if(document.readyState!=='loading') fn(); else document.addEventListener('DOMContentLoaded',fn); }
  // core modal — returns a Promise<boolean>
  function cmpModal(opts){
    return new Promise(function(resolve){
      els(); if(!ov){ resolve(window.confirm(opts.message||'')); return; }
      var o = opts||{};
      if(o.title){ titleEl.style.display='block'; titleEl.textContent=o.title; } else { titleEl.style.display='none'; }
      body.textContent = o.message||'';
      foot.innerHTML='';
      function close(val){ ov.classList.remove('on'); document.removeEventListener('keydown',onKey); resolve(val); }
      function onKey(e){ if(e.key==='Escape' && o.mode!=='alert') close(false); if(e.key==='Enter') close(true); }
      if(o.mode==='confirm'){
        var cancel=document.createElement('button'); cancel.className='cmp-btn cmp-btn-ghost';
        cancel.textContent=o.cancelText||'Cancel'; cancel.onclick=function(){close(false);};
        var ok=document.createElement('button'); ok.className='cmp-btn '+(o.danger?'cmp-btn-danger':'cmp-btn-primary');
        ok.textContent=o.okText||'Confirm'; ok.onclick=function(){close(true);};
        foot.appendChild(cancel); foot.appendChild(ok);
      } else {
        var okb=document.createElement('button'); okb.className='cmp-btn cmp-btn-primary';
        okb.textContent=o.okText||'OK'; okb.onclick=function(){close(true);};
        foot.appendChild(okb);
      }
      ov.classList.add('on'); document.addEventListener('keydown',onKey);
      setTimeout(function(){ var b=foot.querySelector('.cmp-btn-primary,.cmp-btn-danger'); if(b)b.focus(); },30);
    });
  }
  function cmpToast(msg, kind){
    ready(function(){
      var wrap=document.getElementById('cmpToastWrap'); if(!wrap) return;
      var t=document.createElement('div'); t.className='cmp-toast '+(kind==='err'?'err':'ok');
      t.innerHTML='<span class="cmp-logo" style="width:18px;height:18px"></span><span></span>';
      t.querySelector('span:last-child').textContent=msg;
      wrap.appendChild(t);
      setTimeout(function(){ t.style.transition='opacity .3s'; t.style.opacity='0'; setTimeout(function(){t.remove();},300); }, 3200);
    });
  }
  // expose

  function cmpPrompt(message, opts){
    return new Promise(function(resolve){
      els(); if(!ov){ resolve(window.prompt(message||'')); return; }
      var o=opts||{};
      titleEl.style.display = o.title?'block':'none'; if(o.title) titleEl.textContent=o.title;
      body.textContent = message||'';
      var inp=document.getElementById('cmpModalInput');
      inp.style.display='block'; inp.value=o.value||''; inp.placeholder=o.placeholder||'';
      foot.innerHTML='';
      function close(val){ ov.classList.remove('on'); inp.style.display='none';
        document.removeEventListener('keydown',onKey); resolve(val); }
      function onKey(e){ if(e.key==='Escape') close(null); if(e.key==='Enter') close(inp.value); }
      var cancel=document.createElement('button'); cancel.className='cmp-btn cmp-btn-ghost';
      cancel.textContent=o.cancelText||'Cancel'; cancel.onclick=function(){close(null);};
      var ok=document.createElement('button'); ok.className='cmp-btn cmp-btn-primary';
      ok.textContent=o.okText||'OK'; ok.onclick=function(){close(inp.value);};
      foot.appendChild(cancel); foot.appendChild(ok);
      ov.classList.add('on'); document.addEventListener('keydown',onKey);
      setTimeout(function(){ inp.focus(); },30);
    });
  }
  window.cmpPrompt = cmpPrompt;
  window.cmpModal = cmpModal; window.cmpToast = cmpToast;
  // alert(msg)  -> branded modal (async, but callers don't await; fine)
  window.alert = function(msg){ cmpModal({ mode:'alert', message:String(msg==null?'':msg) }); };
  // confirm(msg) -> SYNC shim is impossible with a pretty modal, so we provide
  //   cmpConfirm (async). For legacy synchronous confirm() callers we fall back
  //   to native confirm ONLY if they don't use the async path. To keep existing
  //   call sites working without edits, we expose confirm as async-returning and
  //   ALSO patch the known call pattern via cmpConfirm.
  window.cmpConfirm = function(message, o){ o=o||{}; o.mode='confirm'; o.message=message; return cmpModal(o); };
  ready(function(){ els(); });
})();
</script>
