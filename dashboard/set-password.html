<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Set your password · Companio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --aubergine:#4A4458; --aubergine-dark:#322E3D; --wheat:#E7B86A; --wheat-deep:#C8943B; --offwhite:#F4F0EA; --ink:#241F2B; --line:#E2DBD0; --good:#2E7D52; --bad:#B3121F; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Mulish,system-ui,sans-serif;background:var(--offwhite);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;max-width:420px;width:100%;padding:36px 32px;box-shadow:0 12px 40px rgba(50,46,61,.08)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .mark{width:34px;height:34px;border-radius:50%;background:var(--wheat);display:flex;align-items:center;justify-content:center;color:var(--aubergine-dark);font-weight:800}
  h1{font-family:Fraunces,serif;font-weight:600;font-size:1.5rem;color:var(--aubergine-dark);margin:8px 0 4px}
  p.sub{color:#6b6577;font-size:.95rem;margin:0 0 22px}
  label{display:block;font-weight:700;font-size:.9rem;margin:14px 0 6px;color:var(--aubergine-dark)}
  input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:1rem;font-family:inherit}
  input:focus{outline:none;border-color:var(--wheat-deep)}
  button{width:100%;margin-top:20px;padding:13px;background:var(--aubergine);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:1rem;cursor:pointer}
  button:hover{background:var(--aubergine-dark)}
  button:disabled{opacity:.6;cursor:default}
  .msg{margin-top:16px;padding:11px 14px;border-radius:10px;font-size:.9rem;font-weight:600;display:none}
  .msg.ok{display:block;background:rgba(46,125,82,.1);color:var(--good);border:1px solid rgba(46,125,82,.3)}
  .msg.err{display:block;background:rgba(179,18,31,.08);color:var(--bad);border:1px solid rgba(179,18,31,.28)}
  .hint{font-size:.8rem;color:#6b6577;margin-top:4px}
</style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="mark">∞</span><b style="font-family:Fraunces,serif;color:var(--aubergine-dark)">Companio</b></div>
    <h1>Set your password</h1>
    <p class="sub">Welcome! Choose a password to access your Companio portal.</p>

    <div id="form">
      <label for="pw">New password</label>
      <input type="password" id="pw" placeholder="At least 8 characters" autocomplete="new-password">
      <div class="hint">Use at least 8 characters.</div>
      <label for="pw2">Confirm password</label>
      <input type="password" id="pw2" placeholder="Type it again" autocomplete="new-password">
      <button id="save" onclick="savePassword()">Set password &amp; continue</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

<!-- CONFIG: paste your Supabase project URL + anon public key (same as the dashboard) -->
<script>
const SUPABASE_URL = "https://bouyfsfcfjeordmaaaof.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvdXlmc2ZjZmplb3JkbWFhYW9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MjE5MzMsImV4cCI6MjA5NzI5NzkzM30.Y6KjAafCqTSX_njw4XDJZzv7Ccd6uIDbZW8TCU1JELI";
</script>
<script src="https://esm.sh/@supabase/supabase-js@2"></script>
<script>
(async function () {
  const msg = document.getElementById('msg');
  const show = (t, ok) => { msg.className = 'msg ' + (ok ? 'ok' : 'err'); msg.textContent = t; };

  if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
    show('This page isn’t configured yet. Please contact Companio.', false);
    document.getElementById('form').style.display = 'none';
    return;
  }

  const { createClient } = window.supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // The invite / recovery link puts tokens in the URL hash. Establish a session
  // from them so we can call updateUser() to set the password.
  let role = 'companion';
  try {
    const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
    const access_token = hash.get('access_token');
    const refresh_token = hash.get('refresh_token');
    if (access_token && refresh_token) {
      const { error } = await sb.auth.setSession({ access_token, refresh_token });
      if (error) throw error;
    }
    const { data: { user } } = await sb.auth.getUser();
    role = (user && user.user_metadata && user.user_metadata.role) || 'companion';
    window._role = role;
  } catch (e) {
    show('This link has expired or was already used. Ask Companio to resend your invite.', false);
    document.getElementById('form').style.display = 'none';
  }
})();

async function savePassword() {
  const msg = document.getElementById('msg');
  const show = (t, ok) => { msg.className = 'msg ' + (ok ? 'ok' : 'err'); msg.textContent = t; };
  const pw = document.getElementById('pw').value;
  const pw2 = document.getElementById('pw2').value;
  const btn = document.getElementById('save');

  if (pw.length < 8) return show('Password must be at least 8 characters.', false);
  if (pw !== pw2) return show('The two passwords don’t match.', false);

  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const { createClient } = window.supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { error } = await sb.auth.updateUser({ password: pw });
    if (error) throw error;
    show('Password set! Taking you to your portal…', true);
    const role = window._role || 'companion';
    const dest = role === 'requester' ? 'portal-requester.html' : 'portal-companion.html';
    setTimeout(() => { window.location.href = dest; }, 1400);
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Set password & continue';
    show(e.message || 'Could not set password. Please try again.', false);
  }
}
</script>
</body>
</html>
